<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/>
    </marker>
  </defs>
  <style>
    .person { fill:#08427b; }
    .system { fill:#1168bd; }
    .ext    { fill:#8a8a8a; }
    .t      { fill:#ffffff; font-size:15px; font-weight:bold; }
    .s      { fill:#dbe3ef; font-size:11px; }
    .se     { fill:#eeeeee; font-size:11px; }
    .cap    { fill:#2b3138; font-size:18px; font-weight:bold; }
    .lk     { stroke:#5b6470; stroke-width:2; fill:none; }
    .lt     { fill:#41474f; font-size:11px; }
    .lbg    { fill:#ffffff; }
  </style>
  <rect x="0" y="0" width="900" height="540" fill="#ffffff"/>
  <text class="cap" x="30" y="38">C1 — Контекст системы</text>

  <!-- Person -->
  <rect class="person" x="350" y="64" width="200" height="74" rx="8"/>
  <text class="t" x="450" y="98" text-anchor="middle">Пользователь</text>
  <text class="s" x="450" y="118" text-anchor="middle">Диспетчер / курьер</text>

  <!-- System -->
  <rect class="system" x="330" y="232" width="240" height="86" rx="8"/>
  <text class="t" x="450" y="268" text-anchor="middle">Route Optimization</text>
  <text class="s" x="450" y="288" text-anchor="middle">Строит, оптимизирует</text>
  <text class="s" x="450" y="304" text-anchor="middle">и сравнивает маршруты</text>

  <!-- External -->
  <rect class="ext" x="150" y="420" width="220" height="78" rx="8"/>
  <text class="t" x="260" y="452" text-anchor="middle">OSRM</text>
  <text class="se" x="260" y="472" text-anchor="middle">Маршрутизация</text>
  <text class="se" x="260" y="488" text-anchor="middle">по реальным дорогам</text>

  <rect class="ext" x="530" y="420" width="220" height="78" rx="8"/>
  <text class="t" x="640" y="452" text-anchor="middle">Nominatim</text>
  <text class="se" x="640" y="472" text-anchor="middle">Геокодинг адресов</text>
  <text class="se" x="640" y="488" text-anchor="middle">(OpenStreetMap)</text>

  <!-- Links -->
  <path class="lk" d="M450,138 L450,230" marker-end="url(#arrow)"/>
  <rect class="lbg" x="462" y="176" width="220" height="18"/>
  <text class="lt" x="466" y="189">Строит и оптимизирует · HTTPS</text>

  <path class="lk" d="M395,318 L300,418" marker-end="url(#arrow)"/>
  <rect class="lbg" x="250" y="362" width="150" height="18"/>
  <text class="lt" x="254" y="375">маршрут по дорогам · HTTP</text>

  <path class="lk" d="M505,318 L600,418" marker-end="url(#arrow)"/>
  <rect class="lbg" x="520" y="362" width="150" height="18"/>
  <text class="lt" x="524" y="375">геокодинг адресов · HTTP</text>
</svg>
