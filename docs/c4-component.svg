<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="760" viewBox="0 0 1020 760" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/>
    </marker>
  </defs>
  <style>
    .comp   { fill:#85bbf0; stroke:#5a9bd6; stroke-width:1; }
    .ext    { fill:#8a8a8a; }
    .db     { fill:#438dd5; }
    .bound  { fill:none; stroke:#7f8a99; stroke-width:1.5; stroke-dasharray:6 5; }
    .t      { fill:#10263d; font-size:13px; font-weight:bold; }
    .te     { fill:#ffffff; font-size:13px; font-weight:bold; }
    .s      { fill:#1d3146; font-size:10px; }
    .se     { fill:#eeeeee; font-size:10px; }
    .cap    { fill:#2b3138; font-size:18px; font-weight:bold; }
    .bnd    { fill:#5b6470; font-size:12px; font-weight:bold; }
    .lk     { stroke:#5b6470; stroke-width:1.8; fill:none; }
    .lt     { fill:#41474f; font-size:10px; }
    .lbg    { fill:#ffffff; }
  </style>
  <rect x="0" y="0" width="1020" height="760" fill="#ffffff"/>
  <text class="cap" x="30" y="38">C3 — Компоненты бэкенда (FastAPI)</text>

  <!-- Boundary -->
  <rect class="bound" x="40" y="64" width="620" height="660" rx="12"/>
  <text class="bnd" x="60" y="90">API-приложение (FastAPI)</text>

  <!-- routers -->
  <rect class="comp" x="200" y="108" width="300" height="74" rx="8"/>
  <text class="t" x="350" y="138" text-anchor="middle">API-роутеры</text>
  <text class="s" x="350" y="156" text-anchor="middle">points · routes · geocode · system</text>
  <text class="s" x="350" y="170" text-anchor="middle">backend/api/*</text>

  <!-- services -->
  <rect class="comp" x="200" y="226" width="300" height="74" rx="8"/>
  <text class="t" x="350" y="256" text-anchor="middle">Сервисы</text>
  <text class="s" x="350" y="274" text-anchor="middle">точки · маршруты · геокодинг</text>
  <text class="s" x="350" y="288" text-anchor="middle">backend/services/*</text>

  <!-- optimizer -->
  <rect class="comp" x="70" y="350" width="250" height="74" rx="8"/>
  <text class="t" x="195" y="380" text-anchor="middle">Оптимизатор маршрута</text>
  <text class="s" x="195" y="398" text-anchor="middle">ближайший сосед, 2-opt</text>
  <text class="s" x="195" y="412" text-anchor="middle">routing_service.py</text>

  <!-- routing providers -->
  <rect class="comp" x="380" y="350" width="250" height="74" rx="8"/>
  <text class="t" x="505" y="380" text-anchor="middle">Провайдеры маршрутов</text>
  <text class="s" x="505" y="398" text-anchor="middle">RoutingRouter: OSRM</text>
  <text class="s" x="505" y="412" text-anchor="middle">+ резерв haversine</text>

  <!-- geocoding client -->
  <rect class="comp" x="70" y="468" width="250" height="74" rx="8"/>
  <text class="t" x="195" y="498" text-anchor="middle">Клиент геокодинга</text>
  <text class="s" x="195" y="516" text-anchor="middle">Nominatim-клиент + кэш</text>
  <text class="s" x="195" y="530" text-anchor="middle">backend/services/geocoding.py</text>

  <!-- repositories -->
  <rect class="comp" x="200" y="586" width="300" height="78" rx="8"/>
  <text class="t" x="350" y="616" text-anchor="middle">Репозитории + Unit of Work</text>
  <text class="s" x="350" y="634" text-anchor="middle">доступ к данным, транзакции</text>
  <text class="s" x="350" y="648" text-anchor="middle">repositories/* · db/uow.py</text>

  <!-- External (outside boundary) -->
  <rect class="db"  x="720" y="586" width="250" height="78" rx="8"/>
  <text class="te" x="845" y="620" text-anchor="middle">База данных (SQLite)</text>
  <text class="se" x="845" y="640" text-anchor="middle">точки · маршруты · кэш</text>

  <rect class="ext" x="720" y="350" width="250" height="74" rx="8"/>
  <text class="te" x="845" y="392" text-anchor="middle">OSRM</text>

  <rect class="ext" x="720" y="468" width="250" height="74" rx="8"/>
  <text class="te" x="845" y="510" text-anchor="middle">Nominatim</text>

  <!-- Links inside -->
  <path class="lk" d="M350,182 L350,224" marker-end="url(#arrow)"/>
  <rect class="lbg" x="356" y="196" width="60" height="15"/><text class="lt" x="360" y="208">вызывает</text>

  <path class="lk" d="M300,300 L230,348" marker-end="url(#arrow)"/>
  <rect class="lbg" x="150" y="318" width="120" height="15"/><text class="lt" x="154" y="330">оптимизирует порядок</text>

  <path class="lk" d="M400,300 L470,348" marker-end="url(#arrow)"/>
  <rect class="lbg" x="470" y="318" width="110" height="15"/><text class="lt" x="474" y="330">строит маршрут</text>

  <path class="lk" d="M300,300 C230,330 195,400 195,466" marker-end="url(#arrow)"/>
  <rect class="lbg" x="120" y="430" width="110" height="15"/><text class="lt" x="124" y="442">геокодирует адреса</text>

  <path class="lk" d="M350,300 C350,420 350,520 350,584" marker-end="url(#arrow)"/>
  <rect class="lbg" x="356" y="452" width="120" height="15"/><text class="lt" x="360" y="464">читает / сохраняет</text>

  <!-- Links to externals -->
  <path class="lk" d="M630,387 L718,387" marker-end="url(#arrow)"/>
  <rect class="lbg" x="640" y="368" width="44" height="15"/><text class="lt" x="644" y="380">HTTP</text>

  <path class="lk" d="M320,505 L718,505" marker-end="url(#arrow)"/>
  <rect class="lbg" x="500" y="486" width="44" height="15"/><text class="lt" x="504" y="498">HTTP</text>

  <path class="lk" d="M500,624 L718,624" marker-end="url(#arrow)"/>
  <rect class="lbg" x="556" y="606" width="80" height="15"/><text class="lt" x="560" y="618">SQLAlchemy</text>
</svg>
