<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1000" viewBox="0 0 1240 1000" font-family="Helvetica, Arial, sans-serif">
  <style>
    .bg     { fill:#ffffff; }
    .panel  { fill:#fafbfc; stroke:#c2c7cd; stroke-width:1.5; }
    .card   { fill:#ffffff; stroke:#d3d7dd; stroke-width:1.5; }
    .field  { fill:#eef0f3; stroke:#c2c7cd; stroke-width:1; }
    .btn    { fill:#e3e7ec; stroke:#b4bac1; stroke-width:1; }
    .btn-primary { fill:#cfe0fb; stroke:#9bb8e8; stroke-width:1; }
    .btn-accent  { fill:#d4f0dd; stroke:#9bd3ad; stroke-width:1; }
    .num    { fill:#5b6470; }
    .map    { fill:#f1f4f7; stroke:#c2c7cd; stroke-width:1.5; }
    .title  { fill:#2b3138; font-size:20px; font-weight:bold; }
    .ctitle { fill:#2b3138; font-size:15px; font-weight:bold; }
    .label  { fill:#6b7480; font-size:11px; }
    .ph     { fill:#9aa2ad; font-size:12px; }
    .btxt   { fill:#3a414a; font-size:12px; font-weight:bold; }
    .note   { fill:#8b93a0; font-size:11px; font-style:italic; }
    .pin    { fill:#dbe6f5; stroke:#7fa3d6; stroke-width:1.5; }
    .pinnum { fill:#34506f; font-size:11px; font-weight:bold; }
  </style>

  <rect class="bg" x="0" y="0" width="1240" height="1000"/>

  <!-- Top bar -->
  <rect class="panel" x="20" y="20" width="1200" height="40" rx="8"/>
  <text class="title" x="40" y="47">RouteOpt — Оптимизация маршрутов</text>
  <text class="note" x="1196" y="45" text-anchor="end">браузер · SPA на MapLibre</text>

  <!-- ===================== SIDEBAR ===================== -->
  <rect class="panel" x="20" y="72" width="396" height="908" rx="10"/>
  <text class="note" x="36" y="92">Sidebar (на мобиле — bottom sheet)</text>

  <!-- Step 1 -->
  <rect class="card" x="32" y="104" width="372" height="276" rx="8"/>
  <circle cx="52" cy="128" r="12" class="field"/>
  <text class="num" x="52" y="132" text-anchor="middle" font-size="12" font-weight="bold">1</text>
  <text class="ctitle" x="74" y="132">Генерация точек</text>

  <rect class="field" x="48" y="146" width="168" height="38" rx="6"/>
  <text class="label" x="56" y="160">Число точек</text>
  <text class="ph" x="56" y="177">5</text>
  <rect class="field" x="224" y="146" width="164" height="38" rx="6"/>
  <text class="label" x="232" y="160">Радиус (км)</text>
  <text class="ph" x="232" y="177">5</text>

  <rect class="field" x="48" y="192" width="244" height="38" rx="6"/>
  <text class="label" x="56" y="206">Адрес центра</text>
  <text class="ph" x="56" y="223">Москва, Красная площадь</text>
  <rect class="btn" x="300" y="192" width="88" height="38" rx="6"/>
  <text class="btxt" x="344" y="216" text-anchor="middle">🔍 Найти</text>

  <rect class="field" x="48" y="238" width="168" height="38" rx="6"/>
  <text class="label" x="56" y="252">Широта центра</text>
  <text class="ph" x="56" y="269">55.75</text>
  <rect class="field" x="224" y="238" width="164" height="38" rx="6"/>
  <text class="label" x="232" y="252">Долгота</text>
  <text class="ph" x="232" y="269">37.62</text>

  <rect class="btn-primary" x="48" y="286" width="292" height="40" rx="6"/>
  <text class="btxt" x="194" y="311" text-anchor="middle">＋ Сгенерировать</text>
  <rect class="btn" x="348" y="286" width="40" height="40" rx="6"/>
  <text class="btxt" x="368" y="311" text-anchor="middle">↻</text>

  <rect class="field" x="48" y="334" width="340" height="34" rx="6"/>
  <text class="btxt" x="64" y="356">＋ Добавить точку вручную</text>
  <text class="ph" x="372" y="356" text-anchor="end">▾</text>

  <!-- Step 2 -->
  <rect class="card" x="32" y="392" width="372" height="104" rx="8"/>
  <circle cx="52" cy="416" r="12" class="field"/>
  <text class="num" x="52" y="420" text-anchor="middle" font-size="12" font-weight="bold">2</text>
  <text class="ctitle" x="74" y="420">Базовый маршрут</text>
  <rect class="btn-primary" x="48" y="434" width="340" height="40" rx="6"/>
  <text class="btxt" x="218" y="459" text-anchor="middle">⟶ Построить маршрут</text>
  <text class="ph" x="48" y="490">метрики: расстояние · время</text>

  <!-- Step 3 -->
  <rect class="card" x="32" y="508" width="372" height="300" rx="8"/>
  <circle cx="52" cy="532" r="12" class="field"/>
  <text class="num" x="52" y="536" text-anchor="middle" font-size="12" font-weight="bold">3</text>
  <text class="ctitle" x="74" y="536">Оптимизация (TSP)</text>

  <rect class="field" x="48" y="550" width="340" height="38" rx="6"/>
  <text class="label" x="56" y="564">Метод оптимизации</text>
  <text class="ph" x="56" y="581">Ближайший сосед / 2-opt</text>
  <text class="ph" x="372" y="575" text-anchor="end">▾</text>

  <rect class="btn-accent" x="48" y="596" width="340" height="40" rx="6"/>
  <text class="btxt" x="218" y="621" text-anchor="middle">⚡ Оптимизировать</text>
  <text class="ph" x="48" y="652">метрики: расстояние · время · −%</text>

  <!-- Savings sub-box -->
  <rect class="field" x="48" y="664" width="340" height="132" rx="6"/>
  <text class="ctitle" x="64" y="686" font-size="13">💰 Экономия в рублях</text>
  <text class="label" x="64" y="712">Километры</text>
  <text class="label" x="184" y="712" text-anchor="middle">Минуты</text>
  <text class="label" x="372" y="712" text-anchor="end">Оценка</text>
  <text class="btxt" x="64" y="730">0,0 км</text>
  <text class="btxt" x="184" y="730" text-anchor="middle">0 мин</text>
  <text class="btxt" x="372" y="730" text-anchor="end">0 ₽</text>
  <rect class="field" x="64" y="742" width="150" height="30" rx="5"/>
  <text class="ph" x="74" y="761">₽/км: 35</text>
  <rect class="field" x="222" y="742" width="150" height="30" rx="5"/>
  <text class="ph" x="232" y="761">₽/мин: 8</text>
  <text class="note" x="64" y="789">Расчёт: км × ₽/км + мин × ₽/мин</text>

  <!-- Export -->
  <rect class="card" x="32" y="820" width="372" height="74" rx="8"/>
  <text class="ctitle" x="48" y="844">⬇ Экспорт</text>
  <rect class="btn" x="48" y="854" width="106" height="32" rx="6"/>
  <text class="btxt" x="101" y="874" text-anchor="middle">JSON</text>
  <rect class="btn" x="164" y="854" width="106" height="32" rx="6"/>
  <text class="btxt" x="217" y="874" text-anchor="middle">CSV</text>
  <rect class="btn" x="280" y="854" width="108" height="32" rx="6"/>
  <text class="btxt" x="334" y="874" text-anchor="middle">🔗 Ссылка</text>

  <!-- Order -->
  <rect class="card" x="32" y="906" width="372" height="62" rx="8"/>
  <text class="ctitle" x="48" y="930">№ Порядок посещения</text>
  <text class="ph" x="48" y="952">1 → 3 → 2 → … (список точек)</text>

  <!-- ===================== MAP ===================== -->
  <rect class="map" x="432" y="72" width="788" height="908" rx="10"/>
  <text class="note" x="826" y="540" text-anchor="middle" font-size="14">Карта (MapLibre) — точки и линии маршрутов</text>

  <!-- sample points + route polyline -->
  <polyline points="620,300 760,260 880,360 1010,320 940,470 720,520"
            fill="none" stroke="#7fa3d6" stroke-width="3" stroke-dasharray="2 0"/>
  <g>
    <circle class="pin" cx="620" cy="300" r="14"/><text class="pinnum" x="620" y="304" text-anchor="middle">1</text>
    <circle class="pin" cx="760" cy="260" r="14"/><text class="pinnum" x="760" y="264" text-anchor="middle">2</text>
    <circle class="pin" cx="880" cy="360" r="14"/><text class="pinnum" x="880" y="364" text-anchor="middle">3</text>
    <circle class="pin" cx="1010" cy="320" r="14"/><text class="pinnum" x="1010" y="324" text-anchor="middle">4</text>
    <circle class="pin" cx="940" cy="470" r="14"/><text class="pinnum" x="940" y="474" text-anchor="middle">5</text>
    <circle class="pin" cx="720" cy="520" r="14"/><text class="pinnum" x="720" y="524" text-anchor="middle">6</text>
  </g>

  <!-- route toggle panel (top-right) -->
  <rect class="panel" x="1020" y="92" width="184" height="44" rx="8"/>
  <rect x="1034" y="106" width="14" height="14" rx="3" fill="#3b6fb5"/>
  <text class="btxt" x="1054" y="118">Базовый</text>
  <rect x="1120" y="106" width="14" height="14" rx="3" fill="#3aa15a"/>
  <text class="btxt" x="1140" y="118">Оптим.</text>
</svg>
