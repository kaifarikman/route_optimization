name: Deploy 

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  BACKEND_IMAGE: kaifarikmann/route-optimization-backend
  FRONTEND_IMAGE: kaifarikmann/route-optimization-frontend

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare server compose backup
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail

            mkdir -p ~/route_optimization/data
            cd ~/route_optimization

            if [ -f compose.yaml ]; then
              cp compose.yaml compose.yaml.prev
            fi

      - name: Upload production compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: deploy/compose.yaml
          target: ~/route_optimization
          strip_components: 1

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          TAG: ${{ needs.build-and-push.outputs.tag }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: BACKEND_IMAGE,FRONTEND_IMAGE,TAG
          script: |
            set -euo pipefail

            cd ~/route_optimization

            if [ ! -f .env ]; then
              echo "Missing ~/route_optimization/.env. Create it from deploy/server.env.example before deploying."
              exit 1
            fi

            set -a
            . ./.env
            set +a

            sed -i -E "s|image: ${BACKEND_IMAGE}:.*|image: ${BACKEND_IMAGE}:${TAG}|g" compose.yaml
            sed -i -E "s|image: ${FRONTEND_IMAGE}:.*|image: ${FRONTEND_IMAGE}:${TAG}|g" compose.yaml

            rollback() {
              echo "Deploy failed. Attempting rollback to compose.yaml.prev..."
              docker compose -f compose.yaml ps || true
              docker compose -f compose.yaml logs --tail=100 backend || true
              docker compose -f compose.yaml logs --tail=100 frontend || true

              if [ -f compose.yaml.prev ]; then
                cp compose.yaml.prev compose.yaml
                docker compose -f compose.yaml up -d --remove-orphans || true
              fi
            }

            wait_for_url() {
              local name="$1"
              local url="$2"
              local attempts="${3:-30}"
              local delay="${4:-2}"

              echo "Waiting for ${name}: ${url}"

              for i in $(seq 1 "$attempts"); do
                if curl -fsS "$url" >/tmp/deploy-check-response 2>/tmp/deploy-check-error; then
                  cat /tmp/deploy-check-response
                  echo
                  return 0
                fi

                echo "${name} not ready yet (${i}/${attempts})"
                cat /tmp/deploy-check-error || true
                sleep "$delay"
              done

              echo "${name} did not become ready"
              return 1
            }

            trap rollback ERR

            docker compose -f compose.yaml pull
            docker compose -f compose.yaml up -d --remove-orphans

            BACKEND_PORT="${BACKEND_PORT:-8000}"
            FRONTEND_PORT="${FRONTEND_PORT:-8080}"

            wait_for_url "backend health" "http://127.0.0.1:${BACKEND_PORT}/health"
            wait_for_url "frontend env" "http://127.0.0.1:${FRONTEND_PORT}/js/env.js"
            wait_for_url "frontend api proxy" "http://127.0.0.1:${FRONTEND_PORT}/api/health"

            trap - ERR
            docker image prune -f
