<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система маршрутизации</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="map-wrapper">
        <div id="map"></div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Генерация точек</h3>
            <div class="field">
                <label for="pointsInput">Число точек</label>
                <input type="text" id="pointsInput" placeholder="5">
            </div>
            <div class="field multi">
                <label>Центр доставки</label>
                <div class="coords">
                    <div class="coord-row">
                        <span>N</span>
                        <input type="text" id="northInput" placeholder="20.22">
                    </div>
                    <div class="coord-row">
                        <span>W</span>
                        <input type="text" id="westInput" placeholder="20.22">
                    </div>
                </div>
            </div>
            <div class="field">
                <label for="radInput">Радиус поиска (км)</label>
                <input type="text" id="radInput" placeholder="50">
            </div>
            <button id="generateBtn">Сгенерировать точки</button>
            <button id="clearPointsBtn" class="secondary">Сбросить точки</button>
        </div>

        <div class="card small">
            <div id="status-indicator">Готово</div>
        </div>

        <div class="card small">
            <button id="buildRouteBtn">Построить маршрут</button>
            <p id="baseMetrics">0 км | 0 мин</p>
        </div>

        <div class="card small green">
            <button id="optimizeRouteBtn">Оптимизировать</button>
            <p id="optimizedMetrics">0 км | 0 мин</p>
        </div>

        <div class="card small improvement" id="comparisonCard">
            <p id="comparisonText"></p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/env.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>
</html>
